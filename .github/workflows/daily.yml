name: 每日自动脚本

on:
  schedule:
    # 每天北京时间 07:00 运行 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run-ninebot:
    name: Run Ninebot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ninebot Scripts
        env:
          NINEBOT_TOKEN: ${{ secrets.NINEBOT_TOKEN }}
          NINEBOT_DEVICE_ID: ${{ secrets.NINEBOT_DEVICE_ID }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          COMBINED_SUMMARY_MODE: 'yes'
        run: |
          status=0

          echo "=== 开始执行九号每日签到 ==="
          python ninebot/nine_bot_checkin.py || status=1

          echo "=== 开始执行九号分享与领奖 ==="
          python ninebot/nine_bot_share_reward.py || status=1

          echo "=== 开始执行九号盲盒检查 ==="
          python ninebot/nine_bot_blind_box.py || status=1

          exit $status

      - name: Upload Ninebot Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ninebot-log
          path: ninebot_log.txt
          if-no-files-found: ignore

  run-smzdm:
    name: Run SMZDM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install crypto-js got@11 tough-cookie

      - name: Run SMZDM Scripts
        env:
          SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}
          SMZDM_SK: ${{ secrets.SMZDM_SK }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          SMZDM_TASK_TESTING: 'yes'
          SMZDM_CROWD_SILVER_5: 'no'
          SMZDM_COMMENT: '点赞支持，感谢分享！'
        run: |
          status=0

          echo "=== 开始执行什么值得买每日签到 ==="
          node smzdm/smzdm_checkin.js || status=1

          echo "=== 开始执行什么值得买每日任务 ==="
          node smzdm/smzdm_task.js || status=1

          echo "=== 开始执行什么值得买全民众测 ==="
          node smzdm/smzdm_testing.js || status=1

          exit $status

      - name: Upload SMZDM Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smzdm-log
          path: smzdm_log.txt
          if-no-files-found: ignore

  run-suntory:
    name: Run Suntory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Suntory Sign-in
        env:
          SUNTORY_AUTHORIZATION: ${{ secrets.SUNTORY_AUTHORIZATION }}
          COMBINED_SUMMARY_MODE: 'yes'
        run: |
          set -o pipefail
          python suntory/suntory_signin.py | tee suntory_log.txt

      - name: Upload Suntory Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suntory-log
          path: suntory_log.txt
          if-no-files-found: ignore

  run-dailycharge:
    name: Run DailyCharge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DailyCharge Sign-in
        env:
          DAILYCHARGE_UID: ${{ secrets.DAILYCHARGE_UID }}
          DAILYCHARGE_USERID_LOCKED: ${{ secrets.DAILYCHARGE_USERID_LOCKED }}
          DAILYCHARGE_USERID_OPEN: ${{ secrets.DAILYCHARGE_USERID_OPEN }}
          COMBINED_SUMMARY_MODE: 'yes'
        run: |
          set -o pipefail
          python dailycharge/dailycharge_signin.py | tee dailycharge_log.txt

      - name: Upload DailyCharge Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailycharge-log
          path: dailycharge_log.txt
          if-no-files-found: ignore

  send-summary:
    name: Send Combined Summary
    runs-on: ubuntu-latest
    needs:
      - run-ninebot
      - run-smzdm
      - run-suntory
      - run-dailycharge
    if: always()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download Ninebot Log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: ninebot-log
          path: artifacts/ninebot
        continue-on-error: true

      - name: Download SMZDM Log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: smzdm-log
          path: artifacts/smzdm
        continue-on-error: true

      - name: Download Suntory Log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: suntory-log
          path: artifacts/suntory
        continue-on-error: true

      - name: Download DailyCharge Log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: dailycharge-log
          path: artifacts/dailycharge
        continue-on-error: true

      - name: Send Combined Summary
        env:
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          NINEBOT_JOB_RESULT: ${{ needs.run-ninebot.result }}
          SMZDM_JOB_RESULT: ${{ needs.run-smzdm.result }}
          SUNTORY_JOB_RESULT: ${{ needs.run-suntory.result }}
          DAILYCHARGE_JOB_RESULT: ${{ needs.run-dailycharge.result }}
        run: |
          python send_combined_summary.py
