name: 九号自动脚本

on:
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  run-ninebot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ninebot Scripts
        env:
          NINEBOT_TOKEN: ${{ secrets.NINEBOT_TOKEN }}
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
        run: |
          echo "=== 开始执行九号每日签到 ==="
          python ninebot/nine_bot_checkin.py
          echo "=== 开始执行九号分享与领奖 ==="
          python ninebot/nine_bot_share_reward.py
          echo "=== 开始执行九号盲盒检查 ==="
          python ninebot/nine_bot_blind_box.py
