name: 三得利自动签到

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-suntory:
    name: Run Suntory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Suntory Sign-in
        env:
          SUNTORY_AUTHORIZATION: ${{ secrets.SUNTORY_AUTHORIZATION }}
          COMBINED_SUMMARY_MODE: 'yes'
        run: python suntory/suntory_signin.py
